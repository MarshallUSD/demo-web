<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KindyCloud — launching soon.">
  <meta name="color-scheme" content="light">
  <link rel="icon" href="rainbow.png" type="image/png">
  <title>KindyCloud — Tez kunda</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <div class="ambient ambient-one" aria-hidden="true"></div>
    <div class="ambient ambient-two" aria-hidden="true"></div>
    <div class="shape shape-one" aria-hidden="true"></div>
    <div class="shape shape-two" aria-hidden="true"></div>
    <div class="shape shape-three" aria-hidden="true"></div>

    <header class="topbar">
      <nav class="language-switcher" aria-label="Language switcher">
        <button class="language-button is-active" type="button" data-lang="uz">O‘zbekcha</button>
        <button class="language-button" type="button" data-lang="ru">Русский</button>
        <button class="language-button" type="button" data-lang="en">English</button>
      </nav>
    </header>

    <main class="hero" aria-labelledby="headline">
      <section class="hero-card">
        <div class="brand-line" aria-hidden="true">
          <span class="brand-dot"></span>
          <span class="brand-name">KindyCloud</span>
        </div>

        <div class="copy-block" id="copy-block">
          <h1 id="headline" class="headline">Tez kunda...</h1>
          <p id="subtitle" class="subtitle">KindyCloud — tez orada ishga tushadi.</p>
          <p id="note" class="note">Yangi raqamli platforma tayyorlanmoqda.</p>
        </div>

        <section class="contact-block" aria-labelledby="contact-title">
          <p id="contact-title" class="contact-title">Bog‘lanish</p>
          <ul class="contact-list">
            <li>
              <a href="mailto:alimbusiness91@gmail.com" class="contact-link">
                <span class="contact-label" id="email-label">Email</span>
                <span class="contact-value">alimbusiness91@gmail.com</span>
              </a>
            </li>
            <li>
              <a href="https://www.linkedin.com/in/alimjan-abdullaev-204280379/?skipRedirect=true" class="contact-link" target="_blank" rel="noreferrer">
                <span class="contact-label" id="linkedin-label">LinkedIn</span>
                <span class="contact-value">alimjan-abdullaev</span>
              </a>
            </li>
            <li>
              <a href="https://t.me/my_generalstvo" class="contact-link" target="_blank" rel="noreferrer">
                <span class="contact-label" id="telegram-label">Telegram</span>
                <span class="contact-value">@my_generalstvo</span>
              </a>
            </li>
          </ul>
        </section>
      </section>
    </main>

    <footer class="footer">
      <p id="footer-text">© 2026 KindyCloud. Barcha huquqlar himoyalangan.</p>
      <p class="footer-credit">
        </a>
      </p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
